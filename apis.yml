apis:
  - aid: mri-software:mri-information-exchange-api
    name: MRI Information Exchange (MIX) API
    description: An open and connected ecosystem of secure REST APIs built by MRI and its partners that enables controlled data exchange between MRI's core property management and accounting platform and third-party or custom applications. Over 1,000 unique APIs operate within the MIX environment, all vetted by MRI engineers for security and integrity.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.mrisoftware.com/products/mri-information-exchange/
    baseURL: https://www.mrisoftware.com
    tags:
      - Property Management
      - Accounting
      - Integration
      - Real Estate
    properties:
      - type: Documentation
        url: https://www.mrisoftware.com/products/mri-information-exchange/
      - type: IntegrationsGuide
        url: https://www.mrisoftware.com/wp-content/uploads/2018/01/MRI-API-Integrations-Guide-5.pdf
  - aid: mri-software:mri-onlocation-api
    name: MRI OnLocation REST API
    description: A REST API for integrating with MRI OnLocation's people presence management platform. Enables programmatic access to visitor, contractor, and employee sign-in data, assets, certifications, locations, zones, inductions, and notifications. Supports OAuth 2.0 client credentials and API key authentication.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://apidocs.whosonlocation.com/
    baseURL: https://login.whosonlocation.com
    tags:
      - Visitor Management
      - Contractor Management
      - Facilities
      - People Presence
    properties:
      - type: Documentation
        url: https://apidocs.whosonlocation.com/
      - type: Authentication
        url: https://apidocs.whosonlocation.com/developer-portal/authentication/
  - aid: mri-software:mri-property-management-api
    name: MRI Property Management X API
    description: REST APIs providing programmatic access to MRI's core property management platform, covering residential and commercial property portfolios, units, leases, resident ledgers, maintenance work orders, and AP workflows. Authentication uses OAuth 2.0 with TLS 1.2+ encryption. Access is provisioned through the myMRI client portal.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.mrisoftware.com/mrifunctionalspecs/
    baseURL: https://www.mrisoftware.com
    tags:
      - Property Management
      - Lease Management
      - Residential
      - Commercial
      - Multifamily
